      <rect x="96" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="112" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="128" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="144" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="160" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="176" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="192" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="208" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="224" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="240" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="256" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="272" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="288" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="304" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="320" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="336" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="352" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="368" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="384" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="400" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="416" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="432" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="448" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="464" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="480" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="496" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
    </g>

    <!-- Performance badge -->
    <g transform="translate(147, 336)">
      <rect width="280" height="38" rx="19" fill="#f97583" fill-opacity="0.15"/>
      <text x="140" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#f97583">&#x2717; Half throughput &#x2014; 2 cycles</text>
    </g>
  </g>

  <!-- ==================== BOTTOM: Key Insight ==================== -->
  <g transform="translate(40, 548)">
    <rect width="1180" height="252" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect width="1180" height="252" rx="12" fill="none" stroke="#ffffff" stroke-width="2"/>

    <rect x="2" y="2" width="1176" height="46" rx="10" fill="#1c2128"/>
    <text x="590" y="32" text-anchor="middle" font-size="18" font-weight="500" fill="#76B900">Key Takeaway</text>

    <!-- Code example -->
    <g transform="translate(35, 76)">
      <rect width="540" height="144" rx="10" fill="#0d1117"/>
      <text x="18" y="32" font-family="'RobotoMono', monospace" font-size="13" fill="#b1bac4">// Warp-friendly: uniform control flow</text>
      <text x="18" y="64" font-family="'RobotoMono', monospace" font-size="13"><tspan fill="#d2a8ff">let</tspan><tspan fill="#c9d1d9"> i = thread::index_1d();</tspan></text>
      <text x="18" y="96" font-family="'RobotoMono', monospace" font-size="13"><tspan fill="#c9d1d9">c[i] = a[i] + b[i];</tspan></text>
      <text x="18" y="126" font-family="'RobotoMono', monospace" font-size="12" fill="#b1bac4">// all threads take same path</text>
    </g>

    <!-- Explanation -->
    <g transform="translate(610, 76)">
      <rect width="540" height="144" rx="10" fill="#0d1117"/>
      <text x="20" y="34" font-size="15" fill="#c9d1d9">When all threads in a warp take the <tspan fill="#56d364" font-weight="600">same</tspan></text>
      <text x="20" y="62" font-size="15" fill="#c9d1d9">branch, no divergence occurs &#x2014; full speed.</text>
      <text x="20" y="100" font-size="15" fill="#c9d1d9">Divergent branches execute <tspan fill="#f97583" font-weight="600">serially</tspan>,</text>
      <text x="20" y="128" font-size="15" fill="#c9d1d9">reducing throughput proportional to paths taken.</text>
    </g>
  </g>
</svg>
