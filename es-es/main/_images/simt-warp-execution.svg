<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 840" font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style type="text/css">
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Rg.woff2') format('woff2'); }
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 700; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Bd.woff2') format('woff2'); }
      @font-face { font-family: 'RobotoMono'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/Roboto_Mono/static/RobotoMono-Regular.ttf') format('truetype'); }
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1260" height="840" fill="#0d1117"/>
  <rect width="1260" height="840" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="630" y="44" text-anchor="middle" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="-0.5">SIMT Warp Execution</text>
  <line x1="380" y1="58" x2="880" y2="58" stroke="#76B900" stroke-width="2" opacity="0.6"/>
  <text x="630" y="84" text-anchor="middle" font-size="16" fill="#b1bac4">Same instruction, different data &#x2014; and what happens when threads diverge</text>

  <!-- ==================== LEFT: Uniform Execution ==================== -->
  <g transform="translate(40, 120)">
    <rect width="574" height="390" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect width="574" height="390" rx="12" fill="none" stroke="#56d364" stroke-width="2"/>

    <rect x="2" y="2" width="570" height="46" rx="10" fill="#1c2128"/>
    <text x="287" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#56d364">Uniform execution &#x2014; no divergence</text>

    <!-- Instruction box -->
    <g transform="translate(40, 80)">
      <rect width="494" height="48" rx="8" fill="#0d1117" stroke="#56d364" stroke-width="1"/>
      <text x="247" y="31" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="15" fill="#56d364" filter="url(#glow)">c[i] = a[i] + b[i]</text>
    </g>

    <!-- 32 threads -->
    <g transform="translate(32, 170)">
      <text x="0" y="-8" font-size="13" font-weight="500" fill="#b1bac4">All 32 threads active:</text>

      <rect x="0" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="16" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="32" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="48" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="64" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="80" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="96" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="112" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="128" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="144" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="160" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="176" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="192" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="208" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="224" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="240" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="256" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="272" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="288" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="304" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="320" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="336" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="352" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="368" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="384" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="400" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="416" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="432" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="448" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="464" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="480" y="8" width="14" height="26" rx="3" fill="#56d364"/>
      <rect x="496" y="8" width="14" height="26" rx="3" fill="#56d364"/>

      <!-- Data labels -->
      <text x="0" y="58" font-family="'RobotoMono', monospace" font-size="11" font-weight="500" fill="#9ca3af">a[0]+b[0]</text>
      <text x="140" y="58" font-family="'RobotoMono', monospace" font-size="11" font-weight="500" fill="#9ca3af">a[8]+b[8]</text>
      <text x="280" y="58" font-family="'RobotoMono', monospace" font-size="11" font-weight="500" fill="#9ca3af">. . .</text>
      <text x="420" y="58" font-family="'RobotoMono', monospace" font-size="11" font-weight="500" fill="#9ca3af">a[31]+b[31]</text>
    </g>

    <!-- Performance badge -->
    <g transform="translate(147, 336)">
      <rect width="280" height="38" rx="19" fill="#56d364" fill-opacity="0.15"/>
      <text x="140" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#56d364">&#x2713; Full throughput &#x2014; 1 cycle</text>
    </g>
  </g>

  <!-- ==================== RIGHT: Divergent Execution ==================== -->
  <g transform="translate(646, 120)">
    <rect width="574" height="390" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect width="574" height="390" rx="12" fill="none" stroke="#f97583" stroke-width="2"/>

    <rect x="2" y="2" width="570" height="46" rx="10" fill="#1c2128"/>
    <text x="287" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#f97583">Branch divergence</text>

    <!-- if condition -->
    <g transform="translate(40, 80)">
      <rect width="494" height="48" rx="8" fill="#0d1117" stroke="#f97583" stroke-width="1"/>
      <text x="247" y="31" text-anchor="middle" font-family="'RobotoMono', monospace" font-size="14" fill="#f97583">if i % 2 == 0 { path_A } else { path_B }</text>
    </g>

    <!-- Pass 1: Even threads active -->
    <g transform="translate(32, 168)">
      <text x="0" y="-10" font-size="13" font-weight="500" fill="#d2a8ff">Pass 1 &#x2014; even threads run path_A:</text>

      <rect x="0" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="16" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="32" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="48" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="64" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="80" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="96" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="112" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="128" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="144" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="160" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="176" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="192" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="208" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="224" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="240" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="256" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="272" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="288" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="304" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="320" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="336" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="352" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="368" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="384" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="400" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="416" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="432" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="448" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="464" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="480" y="8" width="14" height="22" rx="3" fill="#d2a8ff"/>
      <rect x="496" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
    </g>

    <!-- Pass 2: Odd threads active -->
    <g transform="translate(32, 244)">
      <text x="0" y="-10" font-size="13" font-weight="500" fill="#79c0ff">Pass 2 &#x2014; odd threads run path_B:</text>

      <rect x="0" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
      <rect x="16" y="8" width="14" height="22" rx="3" fill="#79c0ff"/>
      <rect x="32" y="8" width="14" height="22" rx="3" fill="#21262d" stroke="#6e7681" stroke-width="0.5"/>
