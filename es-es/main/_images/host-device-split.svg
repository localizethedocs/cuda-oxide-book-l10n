<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 580"
     font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style type="text/css">
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Rg.woff2') format('woff2'); }
      @font-face { font-family: 'NVIDIA'; font-style: normal; font-weight: 700; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/GLOBAL/NVIDIASans_W_Bd.woff2') format('woff2'); }
      @font-face { font-family: 'RobotoMono'; font-style: normal; font-weight: 400; src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/Roboto_Mono/static/RobotoMono-Regular.ttf') format('truetype'); }
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/></pattern>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#79c0ff"/><stop offset="50%" stop-color="#e8912d"/><stop offset="100%" stop-color="#d2a8ff"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1260" height="580" fill="#0d1117"/>
  <rect width="1260" height="580" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="630" y="40" text-anchor="middle" font-size="28" font-weight="500" fill="#ffffff" letter-spacing="-0.5">Host / Device Split</text>
  <line x1="440" y1="54" x2="820" y2="54" stroke="url(#titleAccent)" stroke-width="2" opacity="0.8"/>
  <text x="630" y="76" text-anchor="middle" font-size="16" fill="#b1bac4">One build command, two compilation targets</text>

  <!-- Outer container: cargo oxide build -->
  <rect x="60" y="100" width="1140" height="380" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="60" y="100" width="1140" height="380" rx="12" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="630" y="125" text-anchor="middle" font-size="16" font-weight="700" fill="#e8912d" font-family="'RobotoMono', monospace">cargo oxide build</text>

  <!-- Rust source input badge (amber, matching cargo oxide build) -->
  <rect x="130" y="271" rx="16" width="70" height="38" fill="#e8912d" fill-opacity="0.10" stroke="#e8912d" stroke-width="2" stroke-opacity="0.8"/>
  <text x="165" y="295" text-anchor="middle" font-size="14" fill="#e8912d" font-family="'RobotoMono', monospace">.rs</text>

  <!-- Arrow: source to rustc -->
  <line x1="206" y1="290" x2="246" y2="290" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="246,284 260,290 246,296" fill="#c9d1d9" opacity="0.7"/>

  <!-- rustc box (blue accent) -->
  <rect x="260" y="205" width="155" height="170" rx="8" fill="#79c0ff" fill-opacity="0.08" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="337" y="283" text-anchor="middle" font-size="22" font-weight="700" fill="#79c0ff" font-family="'RobotoMono', monospace">rustc</text>
  <text x="337" y="305" text-anchor="middle" font-size="12" fill="#8b949e">MIR + type info</text>

  <!-- Host path arrow: rustc to codegen box -->
  <line x1="421" y1="250" x2="511" y2="250" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="511,244 525,250 511,256" fill="#c9d1d9" opacity="0.7"/>
  <text x="469" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#79c0ff">host</text>

  <!-- Device path arrow: rustc to pipeline box -->
  <line x1="421" y1="333" x2="511" y2="333" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="511,327 525,333 511,339" fill="#c9d1d9" opacity="0.7"/>
  <text x="469" y="323" text-anchor="middle" font-size="14" font-weight="700" fill="#d2a8ff">device</text>

  <!-- Host box: Standard LLVM codegen (blue accent) -->
  <rect x="525" y="212" width="320" height="76" rx="8" fill="#79c0ff" fill-opacity="0.08" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="685" y="245" text-anchor="middle" font-size="17" font-weight="700" fill="#c9d1d9">Standard LLVM codegen</text>
  <text x="685" y="267" text-anchor="middle" font-size="13" fill="#8b949e">(default)</text>

  <!-- Device box: cuda-oxide pipeline (purple accent) -->
  <rect x="525" y="295" width="320" height="76" rx="8" fill="#d2a8ff" fill-opacity="0.08" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="685" y="328" text-anchor="middle" font-size="17" font-weight="700" fill="#c9d1d9">cuda-oxide pipeline</text>
  <text x="685" y="350" text-anchor="middle" font-size="13" fill="#8b949e">(mir-importer, llc)</text>

  <!-- Arrow: host box to ELF pill -->
  <line x1="851" y1="250" x2="986" y2="250" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="986,244 1000,250 986,256" fill="#c9d1d9" opacity="0.7"/>

  <!-- Arrow: device box to PTX pill -->
  <line x1="851" y1="333" x2="986" y2="333" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
  <polygon points="986,327 1000,333 986,339" fill="#c9d1d9" opacity="0.7"/>

  <!-- ELF output pill (blue) -->
  <rect x="1000" y="230" rx="20" width="120" height="40" fill="#79c0ff" fill-opacity="0.15" stroke="#79c0ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="1060" y="255" text-anchor="middle" font-size="18" font-weight="700" fill="#79c0ff" font-family="'RobotoMono', monospace">ELF</text>

  <!-- PTX output pill (purple) -->
  <rect x="1000" y="313" rx="20" width="120" height="40" fill="#d2a8ff" fill-opacity="0.15" stroke="#d2a8ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="1060" y="338" text-anchor="middle" font-size="18" font-weight="700" fill="#d2a8ff" font-family="'RobotoMono', monospace">PTX</text>

  <!-- Annotation -->
  <text x="630" y="510" text-anchor="middle" font-size="13" fill="#b1bac4">Every function goes through rustc's frontend. At the codegen boundary,</text>
  <text x="630" y="528" text-anchor="middle" font-size="13" fill="#b1bac4">kernels go to cuda-oxide; everything else goes to LLVM.</text>
</svg>
