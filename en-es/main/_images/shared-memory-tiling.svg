<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 960"
     font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style>
      @font-face {
        font-family: 'NVIDIA';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/NVIDIASans_W_Rg.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'NVIDIA';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/NVIDIASans_W_Bd.woff2') format('woff2');
        font-weight: 700;
      }
      @font-face {
        font-family: 'RobotoMono';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/roboto-mono/RobotoMono-Regular.ttf') format('truetype');
        font-weight: 400;
      }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#e8912d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f97583" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Clean arrowhead markers -->
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#c9d1d9" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1260" height="960" fill="#0d1117"/>
  <rect width="1260" height="960" fill="url(#grid)"/>

  <!-- Title -->
  <text x="630" y="48" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Tiled Computation with SharedArray</text>
  <text x="630" y="74" text-anchor="middle" fill="#b1bac4" font-size="14" font-weight="600">Load &#x2192; Sync &#x2192; Compute &#x2192; Sync -- the fundamental shared memory pattern</text>
  <line x1="350" y1="84" x2="910" y2="84" stroke="url(#titleAccent)" stroke-width="2" opacity="0.8"/>

  <!-- Phase labels -->
  <text x="145" y="120" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">Global Memory</text>
  <text x="470" y="120" text-anchor="middle" fill="#e8912d" font-size="15" font-weight="700">Phase 1: Load Tile</text>
  <text x="795" y="120" text-anchor="middle" fill="#f97583" font-size="15" font-weight="700">Phase 2: Compute</text>
  <text x="1100" y="120" text-anchor="middle" fill="#d2a8ff" font-size="15" font-weight="700">Output</text>

  <!--
    Panel layout with generous gaps:
      Global:  x=40,  w=210  (ends 250)
      gap: 80px
      Shared:  x=330, w=280  (ends 610)
      gap: 80px
      Compute: x=690, w=210  (ends 900)
      gap: 80px
      Output:  x=980, w=240  (ends 1220)

    Panel technique for fully visible borders:
      1) Fill rect (no stroke) with filter
      2) Header fill rect (clipped to not round bottom)
      3) Stroke-only rect on top (full 3px border, no fill)
  -->

  <!-- ============ GLOBAL MEMORY PANEL ============ -->
  <rect x="40" y="142" width="210" height="380" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="40" y="142" width="210" height="36" rx="12" fill="#1c2128"/>
  <rect x="40" y="166" width="210" height="12" fill="#1c2128"/>
  <rect x="40" y="142" width="210" height="380" rx="12" fill="none" stroke="#79c0ff" stroke-width="3"/>
  <text x="145" y="166" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Matrix A (M x K)</text>

  <!-- Matrix A grid -->
  <g transform="translate(68, 194)">
    <rect width="166" height="120" rx="4" fill="rgba(121,192,255,0.06)" stroke="#79c0ff" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="0" y="0" width="50" height="50" rx="4" fill="rgba(121,192,255,0.2)" stroke="#79c0ff" stroke-width="2"/>
    <text x="25" y="30" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">Tile</text>
    <text x="83" y="-6" fill="#9ca3af" font-size="9" font-weight="600" text-anchor="middle">K cols &#x2192;</text>
    <text x="-14" y="64" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600" transform="rotate(-90 -14 64)">M rows &#x2193;</text>
  </g>

  <!-- Matrix B -->
  <rect x="40" y="340" width="210" height="4" fill="#1c2128"/>
  <text x="145" y="360" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Matrix B (K x N)</text>
  <g transform="translate(58, 378)">
    <rect width="176" height="80" rx="4" fill="rgba(121,192,255,0.06)" stroke="#79c0ff" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="0" y="0" width="50" height="80" rx="4" fill="rgba(121,192,255,0.2)" stroke="#79c0ff" stroke-width="2"/>
    <text x="25" y="44" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">Tile</text>
  </g>

  <!-- ============ SHARED MEMORY PANEL ============ -->
  <rect x="330" y="142" width="310" height="380" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="330" y="142" width="310" height="36" rx="12" fill="#1c2128"/>
  <rect x="330" y="166" width="310" height="12" fill="#1c2128"/>
  <rect x="330" y="142" width="310" height="380" rx="12" fill="none" stroke="#e8912d" stroke-width="3"/>
  <text x="485" y="166" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">SharedArray (Per Block)</text>

  <!-- TILE_A (left margin 20px from panel) -->
  <rect x="350" y="196" width="120" height="90" rx="8" fill="rgba(232,145,45,0.12)" stroke="#e8912d" stroke-width="1.5"/>
  <text x="410" y="220" text-anchor="middle" fill="#e8912d" font-size="12" font-weight="700">TILE_A</text>
  <text x="410" y="238" text-anchor="middle" fill="#b1bac4" font-size="9" font-weight="600" font-family="'RobotoMono', monospace">SharedArray&lt;f32, 256&gt;</text>
  <g opacity="0.8">
    <rect x="363" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="387" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="411" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="435" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <text x="410" y="276" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">cooperative load</text>
  </g>

  <!-- TILE_B (right margin 20px from panel: 640-126=514, check: 514+126=640) -->
  <rect x="494" y="196" width="126" height="90" rx="8" fill="rgba(232,145,45,0.12)" stroke="#e8912d" stroke-width="1.5"/>
  <text x="557" y="220" text-anchor="middle" fill="#e8912d" font-size="12" font-weight="700">TILE_B</text>
  <text x="557" y="238" text-anchor="middle" fill="#b1bac4" font-size="9" font-weight="600" font-family="'RobotoMono', monospace">SharedArray&lt;f32, 256&gt;</text>
  <g opacity="0.8">
    <rect x="506" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="532" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="558" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
    <rect x="584" y="252" width="20" height="7" rx="2" fill="#e8912d" opacity="0.5"/>
  </g>

  <!-- Sync barrier -->
  <rect x="350" y="306" width="270" height="36" rx="8" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="485" y="329" text-anchor="middle" fill="#e8912d" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">thread::sync_threads()</text>

  <text x="485" y="366" text-anchor="middle" fill="#b1bac4" font-size="10" font-weight="600">All threads must finish loading</text>
  <text x="485" y="380" text-anchor="middle" fill="#b1bac4" font-size="10" font-weight="600">before any thread reads the tile</text>

  <!-- Code snippet -->
  <rect x="345" y="400" width="275" height="72" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="357" y="418" fill="#9ca3af" font-size="10" font-weight="600" font-family="'RobotoMono', monospace"><tspan fill="#d2a8ff">static mut</tspan> <tspan fill="#79c0ff">TILE_A</tspan>: SharedArray&lt;..&gt;</text>
  <text x="357" y="434" fill="#9ca3af" font-size="10" font-weight="600" font-family="'RobotoMono', monospace">    = SharedArray::UNINIT;</text>
  <text x="357" y="454" fill="#9ca3af" font-size="10" font-weight="600" font-family="'RobotoMono', monospace"><tspan fill="#e8912d">TILE_A</tspan>[tid] = a[global_idx];</text>
  <text x="357" y="468" fill="#9ca3af" font-size="10" font-weight="600" font-family="'RobotoMono', monospace">thread::<tspan fill="#e8912d">sync_threads</tspan>();</text>

  <!-- ============ COMPUTE PANEL ============ -->
  <rect x="690" y="142" width="240" height="280" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="690" y="142" width="240" height="36" rx="12" fill="#1c2128"/>
  <rect x="690" y="166" width="240" height="12" fill="#1c2128"/>
  <rect x="690" y="142" width="240" height="280" rx="12" fill="none" stroke="#f97583" stroke-width="3"/>
  <text x="810" y="166" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Compute from Shared</text>

  <!-- A x B = C -->
  <g transform="translate(726, 196)">
    <rect width="36" height="36" rx="4" fill="rgba(232,145,45,0.2)" stroke="#e8912d" stroke-width="1"/>
    <text x="18" y="22" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">A</text>
    <text x="50" y="24" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="700">x</text>
    <rect x="62" y="0" width="36" height="36" rx="4" fill="rgba(232,145,45,0.2)" stroke="#e8912d" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">B</text>
    <text x="112" y="24" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="700">=</text>
    <rect x="124" y="0" width="36" height="36" rx="4" fill="rgba(249,117,131,0.2)" stroke="#f97583" stroke-width="1"/>
    <text x="142" y="22" text-anchor="middle" fill="#f97583" font-size="10" font-weight="700">C</text>
  </g>

  <!-- Benefits list -->
  <g transform="translate(710, 256)">
    <circle cx="6" cy="6" r="3.5" fill="#f97583"/>
    <text x="16" y="10" fill="#c9d1d9" font-size="10" font-weight="600">~100x faster than global reads</text>
    <circle cx="6" cy="26" r="3.5" fill="#f97583"/>
    <text x="16" y="30" fill="#c9d1d9" font-size="10" font-weight="600">Each element reused TILE_SIZE times</text>
    <circle cx="6" cy="46" r="3.5" fill="#f97583"/>
    <text x="16" y="50" fill="#c9d1d9" font-size="10" font-weight="600">No bank conflicts (linear access)</text>
    <circle cx="6" cy="66" r="3.5" fill="#f97583"/>
    <text x="16" y="70" fill="#c9d1d9" font-size="10" font-weight="600">Accumulate += across iterations</text>
  </g>

  <!-- Second sync after compute -->
  <rect x="700" y="362" width="220" height="32" rx="8" fill="rgba(249,117,131,0.12)" stroke="#f97583" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="810" y="383" text-anchor="middle" fill="#f97583" font-size="11" font-weight="700" font-family="'RobotoMono', monospace">sync_threads()</text>

  <!-- ============ OUTPUT PANEL ============ -->
  <rect x="980" y="142" width="240" height="180" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="980" y="142" width="240" height="36" rx="12" fill="#1c2128"/>
  <rect x="980" y="166" width="240" height="12" fill="#1c2128"/>
  <rect x="980" y="142" width="240" height="180" rx="12" fill="none" stroke="#d2a8ff" stroke-width="3"/>
  <text x="1100" y="166" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Output Tile &#x2192; C</text>

  <g transform="translate(1000, 196)">
    <rect width="200" height="100" rx="6" fill="rgba(210,168,255,0.1)" stroke="#d2a8ff" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="700">DisjointSlice&lt;f32&gt;</text>
    <text x="100" y="56" text-anchor="middle" fill="#b1bac4" font-size="11" font-weight="600">c[row * N + col] += partial</text>
    <text x="100" y="80" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600">safe write -- one thread per element</text>
  </g>

  <!-- ============ ARROWS between panels (clean horizontal with marker arrowheads) ============ -->
  <!-- Global -> Shared (center of gap: 250 to 330, midY ~280) -->
  <line x1="256" y1="280" x2="324" y2="280" stroke="#c9d1d9" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>

  <!-- Shared -> Compute (center of gap: 640 to 690, midY ~260) -->
  <line x1="646" y1="260" x2="684" y2="260" stroke="#c9d1d9" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>

  <!-- Compute -> Output (center of gap: 930 to 980, midY ~240) -->
  <line x1="936" y1="240" x2="974" y2="240" stroke="#c9d1d9" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>

  <!-- ============ TILING LOOP SECTION ============ -->
  <rect x="40" y="570" width="1180" height="340" rx="12" fill="#161b22" filter="url(#shadow)"/>
  <rect x="40" y="570" width="1180" height="36" rx="12" fill="#1c2128"/>
  <rect x="40" y="594" width="1180" height="12" fill="#1c2128"/>
  <rect x="40" y="570" width="1180" height="340" rx="12" fill="none" stroke="#30363d" stroke-width="3"/>
  <text x="630" y="594" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">The Tiling Loop -- Iterate Over K Dimension</text>

  <!-- Iteration 0 -->
  <g transform="translate(80, 636)">
    <text x="0" y="0" fill="#9ca3af" font-size="11" font-weight="600">Iteration t = 0</text>
    <rect x="0" y="12" width="105" height="36" rx="6" fill="rgba(121,192,255,0.15)" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="52" y="35" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">Load tile[0]</text>
    <rect x="115" y="12" width="50" height="36" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="140" y="35" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">sync</text>
    <rect x="175" y="12" width="110" height="36" rx="6" fill="rgba(249,117,131,0.15)" stroke="#f97583" stroke-width="1.5"/>
    <text x="230" y="35" text-anchor="middle" fill="#f97583" font-size="11" font-weight="700">Compute[0]</text>
    <rect x="295" y="12" width="50" height="36" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="320" y="35" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">sync</text>
  </g>

  <!-- Arrow 0 -> 1 -->
  <line x1="440" y1="660" x2="478" y2="660" stroke="#c9d1d9" stroke-width="2" opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Iteration 1 -->
  <g transform="translate(490, 636)">
    <text x="0" y="0" fill="#9ca3af" font-size="11" font-weight="600">Iteration t = 1</text>
    <rect x="0" y="12" width="105" height="36" rx="6" fill="rgba(121,192,255,0.15)" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="52" y="35" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">Load tile[1]</text>
    <rect x="115" y="12" width="50" height="36" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="140" y="35" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">sync</text>
    <rect x="175" y="12" width="110" height="36" rx="6" fill="rgba(249,117,131,0.15)" stroke="#f97583" stroke-width="1.5"/>
    <text x="230" y="35" text-anchor="middle" fill="#f97583" font-size="11" font-weight="700">Compute[1]</text>
    <rect x="295" y="12" width="50" height="36" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="320" y="35" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">sync</text>
  </g>

  <!-- Dots -->
  <text x="860" y="663" fill="#c9d1d9" font-size="16" font-weight="700">. . .</text>

  <!-- Final iteration -->
  <g transform="translate(910, 636)">
    <text x="0" y="0" fill="#9ca3af" font-size="11" font-weight="600">Final tile</text>
    <rect x="0" y="12" width="105" height="36" rx="6" fill="rgba(121,192,255,0.15)" stroke="#79c0ff" stroke-width="1.5"/>
    <text x="52" y="35" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="700">Load tile[k]</text>
    <rect x="115" y="12" width="50" height="36" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
    <text x="140" y="35" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">sync</text>
    <rect x="175" y="12" width="110" height="36" rx="6" fill="rgba(249,117,131,0.15)" stroke="#f97583" stroke-width="1.5"/>
    <text x="230" y="35" text-anchor="middle" fill="#f97583" font-size="11" font-weight="700">Compute[k]</text>
  </g>

  <!-- Legend row -->
  <g transform="translate(80, 716)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="rgba(121,192,255,0.3)" stroke="#79c0ff" stroke-width="1"/>
    <text x="24" y="13" fill="#79c0ff" font-size="11" font-weight="600">Global &#x2192; Shared (coalesced)</text>

    <rect x="260" y="0" width="16" height="16" rx="3" fill="rgba(232,145,45,0.3)" stroke="#e8912d" stroke-width="1"/>
    <text x="284" y="13" fill="#e8912d" font-size="11" font-weight="600">sync_threads() barrier</text>

    <rect x="500" y="0" width="16" height="16" rx="3" fill="rgba(249,117,131,0.3)" stroke="#f97583" stroke-width="1"/>
    <text x="524" y="13" fill="#f97583" font-size="11" font-weight="600">Compute from shared (fast)</text>

    <rect x="740" y="0" width="16" height="16" rx="3" fill="rgba(210,168,255,0.3)" stroke="#d2a8ff" stroke-width="1"/>
    <text x="764" y="13" fill="#d2a8ff" font-size="11" font-weight="600">Accumulate to output</text>
  </g>

  <!-- Key insight box -->
  <g transform="translate(80, 760)">
    <rect x="0" y="0" width="1060" height="52" rx="8" fill="rgba(121,192,255,0.08)" stroke="#79c0ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#79c0ff" opacity="0.8"/>
    <text x="20" y="22" fill="#79c0ff" font-size="13" font-weight="700">Key Insight</text>
    <text x="20" y="42" fill="#c9d1d9" font-size="11" font-weight="600">Each global memory element is loaded once per block, then reused TILE_SIZE times from shared memory (~5 cycles vs ~500 cycles per access).</text>
  </g>
</svg>
