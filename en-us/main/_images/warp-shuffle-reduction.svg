<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 920"
     font-family="'NVIDIA', 'Inter', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <style>
      @font-face {
        font-family: 'NVIDIA';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/NVIDIASans_W_Rg.woff2') format('woff2');
        font-weight: 400;
      }
      @font-face {
        font-family: 'NVIDIA';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/nvidia-sans/NVIDIASans_W_Bd.woff2') format('woff2');
        font-weight: 700;
      }
      @font-face {
        font-family: 'RobotoMono';
        src: url('https://images.nvidia.com/etc/designs/nvidiaGDC/clientlibs_base/fonts/roboto-mono/RobotoMono-Regular.ttf') format('truetype');
        font-weight: 400;
      }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97583" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#e8912d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1260" height="920" fill="#0d1117"/>
  <rect width="1260" height="920" fill="url(#grid)"/>

  <!-- Title -->
  <text x="630" y="48" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Butterfly Warp Reduction via shuffle_xor</text>
  <text x="630" y="72" text-anchor="middle" fill="#b1bac4" font-size="14" font-weight="600">5 steps to reduce 32 lanes to one value -- no shared memory, no sync_threads</text>
  <line x1="350" y1="82" x2="910" y2="82" stroke="url(#titleAccent)" stroke-width="2" opacity="0.8"/>

  <!-- 8-LANE SIMPLIFIED VIEW -->
  <text x="80" y="116" fill="#9ca3af" font-size="12" font-weight="600">Showing 8 of 32 lanes for clarity. Full warp uses masks 16, 8, 4, 2, 1.</text>

  <!-- Step 0: Initial values (lane boxes at 130px intervals) -->
  <g transform="translate(50, 136)">
    <text x="0" y="16" fill="#ffffff" font-size="14" font-weight="700">Initial</text>
    <text x="0" y="34" fill="#9ca3af" font-size="11" font-weight="600">Each lane holds one value</text>

    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="110" height="44" rx="6" fill="rgba(249,117,131,0.15)" stroke="#f97583" stroke-width="1.5"/>
      <text x="12" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 0</text>
      <text x="12" y="34" fill="#f97583" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v0</text>
      <text x="75" y="34" fill="#f97583" font-size="12" font-family="'RobotoMono', monospace">3.0</text>

      <rect x="125" y="0" width="110" height="44" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
      <text x="137" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 1</text>
      <text x="137" y="34" fill="#e8912d" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v1</text>
      <text x="200" y="34" fill="#e8912d" font-size="12" font-family="'RobotoMono', monospace">1.0</text>

      <rect x="250" y="0" width="110" height="44" rx="6" fill="rgba(121,192,255,0.15)" stroke="#79c0ff" stroke-width="1.5"/>
      <text x="262" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 2</text>
      <text x="262" y="34" fill="#79c0ff" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v2</text>
      <text x="325" y="34" fill="#79c0ff" font-size="12" font-family="'RobotoMono', monospace">4.0</text>

      <rect x="375" y="0" width="110" height="44" rx="6" fill="rgba(210,168,255,0.15)" stroke="#d2a8ff" stroke-width="1.5"/>
      <text x="387" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 3</text>
      <text x="387" y="34" fill="#d2a8ff" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v3</text>
      <text x="450" y="34" fill="#d2a8ff" font-size="12" font-family="'RobotoMono', monospace">2.0</text>

      <rect x="500" y="0" width="110" height="44" rx="6" fill="rgba(249,117,131,0.15)" stroke="#f97583" stroke-width="1.5"/>
      <text x="512" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 4</text>
      <text x="512" y="34" fill="#f97583" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v4</text>
      <text x="575" y="34" fill="#f97583" font-size="12" font-family="'RobotoMono', monospace">5.0</text>

      <rect x="625" y="0" width="110" height="44" rx="6" fill="rgba(232,145,45,0.15)" stroke="#e8912d" stroke-width="1.5"/>
      <text x="637" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 5</text>
      <text x="637" y="34" fill="#e8912d" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v5</text>
      <text x="700" y="34" fill="#e8912d" font-size="12" font-family="'RobotoMono', monospace">1.0</text>

      <rect x="750" y="0" width="110" height="44" rx="6" fill="rgba(121,192,255,0.15)" stroke="#79c0ff" stroke-width="1.5"/>
      <text x="762" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 6</text>
      <text x="762" y="34" fill="#79c0ff" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v6</text>
      <text x="825" y="34" fill="#79c0ff" font-size="12" font-family="'RobotoMono', monospace">2.0</text>

      <rect x="875" y="0" width="110" height="44" rx="6" fill="rgba(210,168,255,0.15)" stroke="#d2a8ff" stroke-width="1.5"/>
      <text x="887" y="16" fill="#9ca3af" font-size="10" font-weight="600">Lane 7</text>
      <text x="887" y="34" fill="#d2a8ff" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">v7</text>
      <text x="950" y="34" fill="#d2a8ff" font-size="12" font-family="'RobotoMono', monospace">6.0</text>
    </g>
  </g>

  <!-- ============ Step 1: XOR mask = 4 ============ -->
  <g transform="translate(50, 218)">
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1170" height="30" rx="12" fill="#1c2128"/>
    <rect x="0" y="18" width="1170" height="12" fill="#1c2128"/>
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="none" stroke="#f97583" stroke-width="3"/>
    <text x="20" y="20" fill="#f97583" font-size="13" font-weight="700">Step 1</text>
    <text x="85" y="20" fill="#c9d1d9" font-size="13" font-weight="600" font-family="'RobotoMono', monospace">shuffle_xor(val, 4)</text>
    <text x="370" y="20" fill="#9ca3af" font-size="12" font-weight="600">Each lane swaps with lane XOR 4: pairs (0,4) (1,5) (2,6) (3,7)</text>

    <!-- Result boxes with bridge connectors -->
    <g transform="translate(40, 46)">
      <!-- Pair 0-4: bridge connector -->
      <line x1="30" y1="-6" x2="30" y2="-16" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <line x1="30" y1="-16" x2="155" y2="-16" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <line x1="155" y1="-16" x2="155" y2="-6" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <text x="92" y="-7" text-anchor="middle" fill="#f97583" font-size="10" font-weight="700">+</text>
      <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(249,117,131,0.2)" stroke="#f97583" stroke-width="1"/>
      <text x="30" y="18" text-anchor="middle" fill="#f97583" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">8.0</text>
      <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">3+5</text>

      <!-- Pair 1-5 -->
      <g transform="translate(156, 0)">
        <line x1="30" y1="-6" x2="30" y2="-16" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <line x1="30" y1="-16" x2="155" y2="-16" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <line x1="155" y1="-16" x2="155" y2="-6" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <text x="92" y="-7" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">+</text>
        <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(232,145,45,0.2)" stroke="#e8912d" stroke-width="1"/>
        <text x="30" y="18" text-anchor="middle" fill="#e8912d" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">2.0</text>
        <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">1+1</text>
      </g>

      <!-- Pair 2-6 -->
      <g transform="translate(312, 0)">
        <line x1="30" y1="-6" x2="30" y2="-16" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
        <line x1="30" y1="-16" x2="155" y2="-16" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
        <line x1="155" y1="-16" x2="155" y2="-6" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
        <text x="92" y="-7" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">+</text>
        <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(121,192,255,0.2)" stroke="#79c0ff" stroke-width="1"/>
        <text x="30" y="18" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">6.0</text>
        <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">4+2</text>
      </g>

      <!-- Pair 3-7 -->
      <g transform="translate(468, 0)">
        <line x1="30" y1="-6" x2="30" y2="-16" stroke="#d2a8ff" stroke-width="1.5" opacity="0.7"/>
        <line x1="30" y1="-16" x2="155" y2="-16" stroke="#d2a8ff" stroke-width="1.5" opacity="0.7"/>
        <line x1="155" y1="-16" x2="155" y2="-6" stroke="#d2a8ff" stroke-width="1.5" opacity="0.7"/>
        <text x="92" y="-7" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="700">+</text>
        <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(210,168,255,0.2)" stroke="#d2a8ff" stroke-width="1"/>
        <text x="30" y="18" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">8.0</text>
        <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">2+6</text>
      </g>
    </g>
  </g>

  <!-- ============ Step 2: XOR mask = 2 ============ -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1170" height="30" rx="12" fill="#1c2128"/>
    <rect x="0" y="18" width="1170" height="12" fill="#1c2128"/>
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="none" stroke="#e8912d" stroke-width="3"/>
    <text x="20" y="20" fill="#e8912d" font-size="13" font-weight="700">Step 2</text>
    <text x="85" y="20" fill="#c9d1d9" font-size="13" font-weight="600" font-family="'RobotoMono', monospace">shuffle_xor(val, 2)</text>
    <text x="370" y="20" fill="#9ca3af" font-size="12" font-weight="600">Each lane swaps with lane XOR 2: pairs (0,2) (1,3)</text>

    <g transform="translate(40, 46)">
      <!-- Pair 0-2: bridge connector (shorter span) -->
      <line x1="30" y1="-6" x2="30" y2="-16" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <line x1="30" y1="-16" x2="90" y2="-16" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <line x1="90" y1="-16" x2="90" y2="-6" stroke="#f97583" stroke-width="1.5" opacity="0.7"/>
      <text x="60" y="-7" text-anchor="middle" fill="#f97583" font-size="10" font-weight="700">+</text>
      <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(249,117,131,0.2)" stroke="#f97583" stroke-width="1"/>
      <text x="30" y="18" text-anchor="middle" fill="#f97583" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">14.0</text>
      <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">8+6</text>

      <!-- Pair 1-3 -->
      <g transform="translate(156, 0)">
        <line x1="30" y1="-6" x2="30" y2="-16" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <line x1="30" y1="-16" x2="90" y2="-16" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <line x1="90" y1="-16" x2="90" y2="-6" stroke="#e8912d" stroke-width="1.5" opacity="0.7"/>
        <text x="60" y="-7" text-anchor="middle" fill="#e8912d" font-size="10" font-weight="700">+</text>
        <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(232,145,45,0.2)" stroke="#e8912d" stroke-width="1"/>
        <text x="30" y="18" text-anchor="middle" fill="#e8912d" font-size="12" font-weight="700" font-family="'RobotoMono', monospace">10.0</text>
        <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">2+8</text>
      </g>
    </g>
  </g>

  <!-- ============ Step 3: XOR mask = 1 ============ -->
  <g transform="translate(50, 522)">
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1170" height="30" rx="12" fill="#1c2128"/>
    <rect x="0" y="18" width="1170" height="12" fill="#1c2128"/>
    <rect x="0" y="0" width="1170" height="120" rx="12" fill="none" stroke="#79c0ff" stroke-width="3"/>
    <text x="20" y="20" fill="#79c0ff" font-size="13" font-weight="700">Step 3</text>
    <text x="85" y="20" fill="#c9d1d9" font-size="13" font-weight="600" font-family="'RobotoMono', monospace">shuffle_xor(val, 1)</text>
    <text x="370" y="20" fill="#9ca3af" font-size="12" font-weight="600">Each lane swaps with lane XOR 1: pairs (0,1)</text>

    <g transform="translate(40, 46)">
      <!-- Pair 0-1: bridge connector (tightest span) -->
      <line x1="30" y1="-6" x2="30" y2="-16" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
      <line x1="30" y1="-16" x2="68" y2="-16" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
      <line x1="68" y1="-16" x2="68" y2="-6" stroke="#79c0ff" stroke-width="1.5" opacity="0.7"/>
      <text x="49" y="-7" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="700">+</text>
      <rect x="0" y="0" width="60" height="26" rx="4" fill="rgba(121,192,255,0.2)" stroke="#79c0ff" stroke-width="2"/>
      <text x="30" y="18" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700" font-family="'RobotoMono', monospace">24.0</text>
      <text x="30" y="50" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">14+10</text>
    </g>

    <!-- Result callout -->
    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="300" height="54" rx="8" fill="rgba(121,192,255,0.1)" stroke="#79c0ff" stroke-width="1.5"/>
      <rect x="0" y="0" width="3" height="54" rx="1.5" fill="#79c0ff" opacity="0.8"/>
      <text x="16" y="22" fill="#79c0ff" font-size="12" font-weight="700">Lane 0 now holds the sum of all 8 lanes</text>
      <text x="16" y="42" fill="#b1bac4" font-size="11" font-weight="600">3+1+4+2+5+1+2+6 = 24.0</text>
    </g>
  </g>

  <!-- ============ CODE PANEL ============ -->
  <g transform="translate(50, 680)">
    <rect x="0" y="0" width="540" height="170" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect x="0" y="0" width="540" height="30" rx="12" fill="#1c2128"/>
    <rect x="0" y="18" width="540" height="12" fill="#1c2128"/>
    <rect x="0" y="0" width="540" height="170" rx="12" fill="none" stroke="#30363d" stroke-width="3"/>
    <text x="20" y="20" fill="#c9d1d9" font-size="12" font-weight="600">The Code (5 lines, no shared memory)</text>

    <g transform="translate(16, 48)" font-family="'RobotoMono', monospace" font-size="12" font-weight="600">
      <text x="0" y="0" fill="#d2a8ff">let mut</text><text x="56" y="0" fill="#c9d1d9"> val = input[thread::index_1d().get()];</text>
      <text x="0" y="22" fill="#c9d1d9">val += warp::</text><text x="88" y="22" fill="#f97583">shuffle_xor_f32</text><text x="230" y="22" fill="#c9d1d9">(val, 16);</text>
      <text x="0" y="44" fill="#c9d1d9">val += warp::</text><text x="88" y="44" fill="#e8912d">shuffle_xor_f32</text><text x="230" y="44" fill="#c9d1d9">(val, 8);</text>
      <text x="0" y="66" fill="#c9d1d9">val += warp::</text><text x="88" y="66" fill="#79c0ff">shuffle_xor_f32</text><text x="230" y="66" fill="#c9d1d9">(val, 4);</text>
      <text x="0" y="88" fill="#c9d1d9">val += warp::shuffle_xor_f32(val, 2);</text>
      <text x="0" y="110" fill="#c9d1d9">val += warp::shuffle_xor_f32(val, 1);</text>
    </g>
  </g>

  <!-- ============ COMPARISON PANEL ============ -->
  <g transform="translate(630, 680)">
    <rect x="0" y="0" width="590" height="170" rx="12" fill="#161b22" filter="url(#shadow)"/>
    <rect x="0" y="0" width="590" height="30" rx="12" fill="#1c2128"/>
    <rect x="0" y="18" width="590" height="12" fill="#1c2128"/>
    <rect x="0" y="0" width="590" height="170" rx="12" fill="none" stroke="#30363d" stroke-width="3"/>
    <text x="20" y="20" fill="#c9d1d9" font-size="12" font-weight="600">Shuffle vs Shared Memory Reduction</text>

    <g transform="translate(20, 50)">
      <text x="0" y="0" fill="#f97583" font-size="13" font-weight="700">Warp Shuffle</text>
      <text x="0" y="22" fill="#b1bac4" font-size="11" font-weight="600">* ~1 cycle per shuffle</text>
      <text x="0" y="42" fill="#b1bac4" font-size="11" font-weight="600">* 5 steps for 32 lanes</text>
      <text x="0" y="62" fill="#b1bac4" font-size="11" font-weight="600">* No shared memory used</text>
      <text x="0" y="82" fill="#b1bac4" font-size="11" font-weight="600">* No sync_threads() needed</text>
    </g>

    <g transform="translate(290, 50)">
      <text x="0" y="0" fill="#e8912d" font-size="13" font-weight="700">Shared Memory</text>
      <text x="0" y="22" fill="#b1bac4" font-size="11" font-weight="600">* ~5 cycles per access</text>
      <text x="0" y="42" fill="#b1bac4" font-size="11" font-weight="600">* 5 steps + 5 barriers</text>
      <text x="0" y="62" fill="#b1bac4" font-size="11" font-weight="600">* Uses SMEM capacity</text>
      <text x="0" y="82" fill="#b1bac4" font-size="11" font-weight="600">* Works across warps</text>
    </g>
  </g>
</svg>
